<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realtime Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>Realtime Chat</h1>
        <p class="subtitle">Typed WebSocket chat server and client.</p>
        <form id="join-form" class="row">
          <input id="name-input" type="text" maxlength="30" placeholder="Your name" required />
          <button id="join-btn" type="submit">Join</button>
        </form>
        <div id="status" class="status">Connecting...</div>
        <div id="presence" class="presence">No users online</div>
      </section>
      <section class="panel">
        <ul id="messages" class="messages"></ul>
        <form id="chat-form" class="row">
          <input id="chat-input" type="text" maxlength="300" placeholder="Type message" disabled required />
          <button id="send-btn" type="submit" disabled>Send</button>
        </form>
      </section>
    </main>
    <script src="/client.js"></script>
  </body>
</html>
